name: Deploy to AWS

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - production

env:
  AWS_REGION: us-east-1
  PROJECT_NAME: job-app
  REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com

jobs:
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ env.PROJECT_NAME }}-backend
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -f Api/Dockerfile .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Build and push frontend image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ env.PROJECT_NAME }}-frontend
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -f client/Dockerfile .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Output image URIs
        run: |
          echo "Backend Image: ${{ steps.login-ecr.outputs.registry }}/${{ env.PROJECT_NAME }}-backend:${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "Frontend Image: ${{ steps.login-ecr.outputs.registry }}/${{ env.PROJECT_NAME }}-frontend:${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

  deploy:
    name: Deploy Infrastructure
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      TF_VERSION: 1.5.0

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive devops/terraform/
        continue-on-error: true

      - name: Terraform Init
        id: init
        run: |
          cd devops/terraform
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=prod/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}"

      - name: Terraform Validate
        id: validate
        run: |
          cd devops/terraform
          terraform validate

      - name: Terraform Plan
        id: plan
        run: |
          cd devops/terraform
          terraform plan \
            -var-file=environments/production.tfvars \
            -var="aws_region=${{ env.AWS_REGION }}" \
            -out=tfplan
        continue-on-error: true

      - name: Terraform Apply
        id: apply
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        run: |
          cd devops/terraform
          terraform apply -auto-approve tfplan

      - name: Update ECS Services
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        run: |
          CLUSTER="${{ env.PROJECT_NAME }}-production-cluster"
          for service in backend frontend; do
            aws ecs update-service \
              --cluster $CLUSTER \
              --service ${{ env.PROJECT_NAME }}-production-${service} \
              --force-new-deployment \
              --region ${{ env.AWS_REGION }}
          done

      - name: Wait for ECS services
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        run: |
          sleep 30
          CLUSTER="${{ env.PROJECT_NAME }}-production-cluster"
          for service in backend frontend; do
            aws ecs wait services-stable \
              --cluster $CLUSTER \
              --services ${{ env.PROJECT_NAME }}-production-${service} \
              --region ${{ env.AWS_REGION }}
          done

      - name: Run health checks
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        run: |
          bash devops/scripts/health-check.sh production

      - name: Rollback on failure
        if: failure() && github.ref == 'refs/heads/master' && github.event_name == 'push'
        run: |
          bash devops/scripts/rollback.sh production

      - name: Slack notification
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: 'Deployment to production: ${{ job.status }}'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true

  security-scan:
    name: Security Scanning
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Scan ECR images for vulnerabilities
        run: |
          for repo in backend frontend; do
            echo "Scanning $repo image..."
            aws ecr start-image-scan \
              --repository-name ${{ env.PROJECT_NAME }}-${repo} \
              --image-id imageTag=latest \
              --region ${{ env.AWS_REGION }} || true
          done

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

  tests:
    name: Run Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: test_db
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
        ports:
          - 3306:3306

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install backend dependencies
        run: cd Api && npm ci

      - name: Run backend tests
        run: cd Api && npm run test
        env:
          NODE_ENV: test
          DATABASE_URL: mysql://root:root@localhost:3306/test_db

      - name: Install frontend dependencies
        run: cd client && npm ci

      - name: Run frontend tests
        run: cd client && npm run test:ci
        env:
          CI: true

      - name: Build frontend
        run: cd client && npm run build
        env:
          REACT_APP_API_URL: http://localhost:5000
