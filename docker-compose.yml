version: '3.9'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: job-app-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-job_app_db}
      MYSQL_USER: ${MYSQL_USER:-app_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-apppassword}
      MYSQL_INITDB_SKIP_TZINFO: "yes"
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./devops/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 10
    networks:
      - job-app-network
    restart: unless-stopped

  # Backend API
  backend:
    build:
      context: .
      dockerfile: Api/Dockerfile
    container_name: job-app-backend
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: mysql://${MYSQL_USER:-app_user}:${MYSQL_PASSWORD:-apppassword}@mysql:3306/${MYSQL_DATABASE:-job_app_db}
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      RAPIDAPI_KEY: ${RAPIDAPI_KEY}
      PORT: 5000
    ports:
      - "5000:5000"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./Api/src:/app/src
      - ./Api/node_modules:/app/node_modules
    networks:
      - job-app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Frontend React App
  frontend:
    build:
      context: .
      dockerfile: client/Dockerfile
    container_name: job-app-frontend
    environment:
      REACT_APP_API_URL: http://localhost/api
      NODE_ENV: ${NODE_ENV:-development}
    ports:
      - "80:80"
    depends_on:
      - backend
    volumes:
      - ./client/src:/app/src
      - ./client/public:/app/public
    networks:
      - job-app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Optional: phpMyAdmin for database management
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: job-app-phpmyadmin
    environment:
      PMA_HOST: mysql
      PMA_USER: ${MYSQL_USER:-app_user}
      PMA_PASSWORD: ${MYSQL_PASSWORD:-apppassword}
      PMA_PORT: 3306
    ports:
      - "8081:80"
    depends_on:
      - mysql
    networks:
      - job-app-network
    restart: unless-stopped
    profiles:
      - debug

volumes:
  mysql_data:
    driver: local

networks:
  job-app-network:
    driver: bridge
